<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Expense Analytics Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#4f46e5,#06b6d4);
min-height:100vh;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
padding:30px;
border-radius:20px;
border:2px solid rgba(255,255,255,0.3);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
text-align:center;
color:white;
margin-bottom:30px;
font-size:36px;
}

.form{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:30px;
}

input,select{
padding:12px;
width:220px;
border:2px solid #ddd;
border-radius:10px;
font-size:16px;
outline:none;
}

input:focus,
select:focus{
border-color:#4f46e5;
}

button{
padding:12px 25px;
background:#4f46e5;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#312e81;
transform:scale(1.05);
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
padding:25px;
border-radius:15px;
text-align:center;
color:white;
border:2px solid rgba(255,255,255,0.3);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.income{
background:linear-gradient(135deg,#16a34a,#22c55e);
}

.expense{
background:linear-gradient(135deg,#dc2626,#ef4444);
}

.balance{
background:linear-gradient(135deg,#2563eb,#3b82f6);
}

.card h2{
margin-bottom:10px;
}

.card p{
font-size:28px;
font-weight:bold;
}

.table-container{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:15px;
overflow:hidden;
border:2px solid #ddd;
}

th{
background:#4f46e5;
color:white;
padding:15px;
font-size:16px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f3f4f6;
}

.footer{
margin-top:20px;
text-align:center;
color:white;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>💰 Daily Expense Analytics Dashboard</h1>

<div class="form">

<input type="number" id="amount" placeholder="Enter Amount">

<select id="type">
<option>Income</option>
<option>Expense</option>
</select>

<input type="text" id="category" placeholder="Enter Category">

<button onclick="addTransaction()">
Add Transaction
</button>

</div>

<div class="summary">

<div class="card income">
<h2>Total Income</h2>
<p id="income">₹0</p>
</div>

<div class="card expense">
<h2>Total Expense</h2>
<p id="expense">₹0</p>
</div>

<div class="card balance">
<h2>Balance</h2>
<p id="balance">₹0</p>
</div>

</div>

<div class="table-container">

<table>

<thead>
<tr>
<th>Type</th>
<th>Category</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>

</table>

</div>

<div class="footer">
© 2026 Daily Expense Analytics Dashboard
</div>

</div>

<script>

let income=0;
let expense=0;

function addTransaction(){

let amount=Number(document.getElementById("amount").value);
let type=document.getElementById("type").value;
let category=document.getElementById("category").value;

if(amount==="" || category===""){
alert("Please fill all fields");
return;
}

let row=`
<tr>
<td>${type}</td>
<td>${category}</td>
<td>₹${amount}</td>
</tr>
`;

document.getElementById("tableBody").innerHTML += row;

if(type==="Income"){
income += amount;
}else{
expense += amount;
}

document.getElementById("income").innerText="₹"+income;
document.getElementById("expense").innerText="₹"+expense;
document.getElementById("balance").innerText="₹"+(income-expense);

document.getElementById("amount").value="";
document.getElementById("category").value="";
}

</script>

</body>
</html>
