<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Expense Analytics Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#4f46e5,#06b6d4);
min-height:100vh;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
padding:30px;
border-radius:20px;
border:2px solid rgba(255,255,255,.3);
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
text-align:center;
color:#fff;
margin-bottom:30px;
font-size:36px;
}

.form{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:30px;
}

input,select{
padding:12px;
width:220px;
border:2px solid #ddd;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
padding:12px 25px;
background:#4f46e5;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#312e81;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
padding:25px;
border-radius:15px;
text-align:center;
color:#fff;
}

.income{
background:#16a34a;
}

.expense{
background:#dc2626;
}

.balance{
background:#2563eb;
}

.card p{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
}

th{
background:#4f46e5;
color:#fff;
padding:15px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

.delete-btn{
background:#dc2626;
padding:6px 12px;
border-radius:6px;
color:white;
border:none;
cursor:pointer;
}

.footer{
margin-top:20px;
text-align:center;
color:white;
}
</style>
</head>

<body>

<div class="container">

<h1>💰 Daily Expense Analytics Dashboard</h1>

<div class="form">

<input type="number" id="amount" placeholder="Enter Amount">

<select id="type">
<option>Income</option>
<option>Expense</option>
</select>

<input type="text" id="category" placeholder="Enter Category">

<button onclick="addTransaction()">
Add Transaction
</button>

</div>

<div class="summary">

<div class="card income">
<h2>Total Income</h2>
<p id="income">₹0</p>
</div>

<div class="card expense">
<h2>Total Expense</h2>
<p id="expense">₹0</p>
</div>

<div class="card balance">
<h2>Balance</h2>
<p id="balance">₹0</p>
</div>

</div>

<table>

<thead>
<tr>
<th>Type</th>
<th>Category</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>

</table>

<div class="footer">
© 2026 Daily Expense Analytics Dashboard
</div>

</div>

<script>

let income = 0;
let expense = 0;

function addTransaction(){

const amountInput = document.getElementById("amount");
const categoryInput = document.getElementById("category");

const amount = Number(amountInput.value);
const type = document.getElementById("type").value;
const category = categoryInput.value.trim();

if(amount <= 0 || category === ""){
alert("Please enter valid details");
return;
}

const row=document.createElement("tr");

row.innerHTML=`
<td>${type}</td>
<td>${category}</td>
<td>₹${amount}</td>
<td>
<button class="delete-btn" onclick="deleteTransaction(this,'${type}',${amount})">
Delete
</button>
</td>
`;

document.getElementById("tableBody").appendChild(row);

if(type==="Income"){
income+=amount;
}else{
expense+=amount;
}

updateSummary();

amountInput.value="";
categoryInput.value="";
}

function deleteTransaction(btn,type,amount){

btn.parentElement.parentElement.remove();

if(type==="Income"){
income-=amount;
}else{
expense-=amount;
}

updateSummary();

}

function updateSummary(){

document.getElementById("income").innerText="₹"+income;
document.getElementById("expense").innerText="₹"+expense;
document.getElementById("balance").innerText="₹"+(income-expense);

}

</script>

</body>
</html>
